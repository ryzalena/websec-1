<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lab1</title>
    <link rel = "stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="calc">
            <form>
                <input class="border" type ="number" id="num1" required>
                <select class="sign border" id="operator">
                    <option value="+" selected>+</option>
                    <option value="-">-</option>
                    <option value="*">*</option>
                    <option value="/">/</option>
                </select>
                <input class="border" type ="number" id="num2" required>
            </form>

            <div class="button">
                <button class="border" id="calculateBtn">
                    <p>подсчитать</p>
                </button>
            </div>

            <div class="result-container border">
                <p class="history" id="history"></p>
                <p id="currentResult"></p>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
